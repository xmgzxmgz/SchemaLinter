# SchemaLinter 示例项目配置文件

# 项目基本信息
project_path: "."
programming_language: "python"
db_connector_type: "sqlalchemy"

# 数据库模式文件路径
base_schema_path: "../schemas/base_schema.sql"
target_schema_path: "../schemas/target_schema.sql"

# 文件匹配模式
file_patterns:
  include:
    - "**/*.py"
  exclude:
    - "**/__pycache__/**"
    - "**/tests/**"

# 输出配置
output:
  format: "console"
  file: null